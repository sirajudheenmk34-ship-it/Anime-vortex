<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVortex | Blue Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #007bff; /* Bright Blue */
            --bg-dark: #020b1a; /* Dark Navy Blue */
            --card-bg: #0a192f; /* Darker Blue for cards */
            --text-blue: #00d4ff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Splash Screen */
        #splash-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        .splash-logo { 
            width: 80px; height: 80px; background: var(--accent); border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 40px; animation: zoomIn 1s infinite alternate; 
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.6);
        }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Main UI */
        #main-content { opacity: 0; transition: 1s; }
        .header-section { padding: 50px 6% 30px; text-align: center; }
        .brand { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; cursor: pointer; }
        .logo-icon { 
            width: 50px; height: 50px; background: var(--accent); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 24px; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }
        .brand-name { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-blue); }

        .search-box-container { max-width: 600px; margin: 0 auto; }
        .search-box-container input { 
            width: 100%; padding: 16px 25px; border-radius: 50px; 
            border: 2px solid #1e3a5f; background: #0d2137; color: white; outline: none; 
        }
        .search-box-container input:focus { border-color: var(--accent); }

        /* Anime Grid */
        .container { padding: 40px 6%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #1e3a5f; position: relative; }
        .card:hover { transform: scale(1.03); border-color: var(--accent); }
        .card img { width: 100%; height: 230px; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 12px; text-align: center; }
        .card-info h3 { font-size: 14px; color: var(--text-blue); }
        
        .admin-btns { position: absolute; top: 5px; right: 5px; display: none; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { width: 90%; max-width: 500px; background: #0d2137; padding: 25px; border-radius: 15px; border: 1px solid var(--accent); }
        .modal-box h2 { margin-bottom: 15px; color: var(--text-blue); }
        .modal-box input { width: 100%; padding: 12px; margin: 10px 0; background: #020b1a; border: 1px solid #1e3a5f; color: white; border-radius: 5px; }
        .modal-box button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        .progress-container { width: 100%; background: #1e3a5f; border-radius: 5px; display: none; margin: 10px 0; }
        .progress-bar { width: 0%; height: 8px; background: var(--text-blue); border-radius: 5px; transition: 0.3s; }

        /* Video Player */
        video { width: 100%; aspect-ratio: 16/9; border-radius: 8px; background: #000; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">V</div>
        <h1 style="margin-top: 20px; letter-spacing: 3px; color: #007bff;">ANIMEVORTEX</h1>
    </div>

    <div id="main-content">
        <div class="header-section">
            <div class="brand" onclick="checkAdmin()">
                <div class="logo-icon">V</div>
                <div class="brand-name">AnimeVortex</div>
            </div>
            <div class="search-box-container">
                <input type="text" id="searchBar" placeholder="Search your video...">
            </div>
            <button id="addBtn" style="display:none; margin-top:20px; padding:10px 20px; background:var(--accent); border:none; color:white; border-radius:5px; cursor:pointer;" onclick="openUploadModal()">+ Upload New Video</button>
        </div>

        <main class="container">
            <div class="grid" id="animeGrid"></div>
        </main>
    </div>

    <!-- Admin Modal (Video Only) -->
    <div id="adminModal" class="overlay">
        <div class="modal-box">
            <h2>Upload Video</h2>
            <input type="text" id="animeTitle" placeholder="Video Name/Title">
            
            <label style="font-size: 12px; color: #888;">Select Video from Gallery</label>
            <input type="file" id="videoFile" accept="video/*">

            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>
            <p id="statusMsg" style="font-size: 12px; text-align: center; color: var(--text-blue); margin-top: 5px;"></p>

            <button id="saveBtn" onclick="handleUpload()">Upload & Save</button>
            <button style="background:#333; margin-top: 10px;" onclick="closeModal('adminModal')">Cancel</button>
        </div>
    </div>

    <!-- Video Player -->
    <div id="playerOverlay" class="overlay">
        <div class="player-box" style="width: 95%; max-width: 900px;">
            <div style="text-align: right; cursor: pointer; padding: 10px; color: var(--text-blue);" onclick="closePlayer()">CLOSE [X]</div>
            <div id="videoContainer"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB5EXeX3OOdtuKmrjRmp22V74NATBgGysk",
            authDomain: "animevortex-f9590.firebaseapp.com",
            projectId: "animevortex-f9590",
            storageBucket: "animevortex-f9590.firebasestorage.app",
            messagingSenderId: "983386922614",
            appId: "1:983386922614:web:ab60c63a0b637e2bfa0957",
            databaseURL: "https://animevortex-f9590-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('animeData');
        const storage = firebase.storage();

        let animeData = [];
        let isAdmin = false;

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            animeData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderGrid(animeData);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
            }, 2500);
        });

        function renderGrid(data) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                // ഡിഫോൾട്ട് ബ്ലൂ അനിമേഷൻ ബാക്ക്ഗ്രൗണ്ട് ഇമേജ് ആയി നൽകുന്നു
                const defaultImg = "https://img.freepik.com/free-vector/abstract-blue-speed-zoom-background_1017-26154.jpg";
                card.innerHTML = `
                    <img src="${item.image || defaultImg}" onclick="openPlayer('${item.url}')">
                    <div class="card-info"><h3>${item.title}</h3></div>
                    <div class="admin-btns" style="display:${isAdmin ? 'block' : 'none'}">
                        <button class="del-btn" onclick="deleteAnime('${item.id}')">X</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function handleUpload() {
            const title = document.getElementById('animeTitle').value;
            const videoFile = document.getElementById('videoFile').files[0];

            if(!title || !videoFile) return alert("Title-ഉം Video-യും നിർബന്ധമാണ്!");

            document.getElementById('progContainer').style.display = 'block';
            const status = document.getElementById('statusMsg');

            try {
                status.innerText = "അപ്‌ലോഡ് ചെയ്യുന്നു... ദയവായി കാത്തിരിക്കുക";
                const videoRef = storage.ref(`videos/${Date.now()}_${videoFile.name}`);
                const uploadTask = videoRef.put(videoFile);

                uploadTask.on('state_changed', (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById('progBar').style.width = progress + '%';
                }, null, async () => {
                    const videoUrl = await videoRef.getDownloadURL();
                    // ഫോട്ടോ ഇല്ലാത്തതുകൊണ്ട് ഒരു ബ്ലൂ ഗ്രാഫിക്സ് ഇമേജ് ഓട്ടോമാറ്റിക് ആയി വരും
                    const defaultImg = "https://img.freepik.com/free-vector/abstract-blue-speed-zoom-background_1017-26154.jpg";
                    db.push({ title, image: defaultImg, url: videoUrl });
                    status.innerText = "വിജയകരമായി അപ്‌ലോഡ് ചെയ്തു!";
                    setTimeout(() => closeModal('adminModal'), 1000);
                });
            } catch (err) {
                alert("Error! Rules സെറ്റ് ചെയ്തിട്ടുണ്ടോ എന്ന് പരിശോധിക്കുക.");
            }
        }

        function checkAdmin() {
            if(prompt("അഡ്മിൻ പാസ്‌വേഡ് അടിക്കുക:") === "9847ni") {
                isAdmin = true;
                document.getElementById('addBtn').style.display = 'inline-block';
                renderGrid(animeData);
            }
        }

        function openPlayer(url) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = `<video src="${url}" controls autoplay></video>`;
            document.getElementById('playerOverlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
        }

        function openUploadModal() {
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('progBar').style.width = '0%';
            document.getElementById('statusMsg').innerText = '';
        }

        function deleteAnime(id) {
            if(confirm("ഇത് ഡിലീറ്റ് ചെയ്യട്ടെ?")) firebase.database().ref('animeData/' + id).remove();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = animeData.filter(a => a.title.toLowerCase().includes(query));
            renderGrid(filtered);
        });
    </script>
</body>
</html>
