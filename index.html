<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVortex | Gallery Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2e2e; --bg-dark: #050505; --card-bg: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Splash Screen */
        #splash-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        .splash-logo { width: 80px; height: 80px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 40px; animation: zoomIn 1s infinite alternate; }
        @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Main UI */
        #main-content { opacity: 0; transition: 1s; }
        .header-section { padding: 50px 6% 30px; text-align: center; }
        .brand { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; cursor: pointer; }
        .logo-icon { width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; }
        .brand-name { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .search-box-container { max-width: 600px; margin: 0 auto; }
        .search-box-container input { width: 100%; padding: 16px 25px; border-radius: 50px; border: 2px solid #333; background: #1a1a1a; color: white; outline: none; }

        /* Anime Grid */
        .container { padding: 40px 6%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        
        .admin-btns { position: absolute; top: 5px; right: 5px; display: none; flex-direction: column; gap: 5px; }
        .admin-btns button { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .edit-btn { background: #f39c12; color: white; }
        .del-btn { background: #e74c3c; color: white; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { width: 90%; max-width: 500px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .modal-box h2 { margin-bottom: 15px; color: var(--accent); }
        .modal-box label { font-size: 12px; color: #888; display: block; margin-top: 10px; }
        .modal-box input { width: 100%; padding: 12px; margin: 5px 0 10px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }
        .modal-box button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        /* Progress Bar */
        .progress-container { width: 100%; background: #333; border-radius: 5px; display: none; margin-bottom: 10px; }
        .progress-bar { width: 0%; height: 10px; background: var(--accent); border-radius: 5px; transition: 0.3s; }

        /* Player */
        iframe, video { width: 100%; aspect-ratio: 16/9; border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">V</div>
        <h1 style="margin-top: 20px; letter-spacing: 3px;">ANIMEVORTEX</h1>
    </div>

    <div id="main-content">
        <div class="header-section">
            <div class="brand" onclick="checkAdmin()">
                <div class="logo-icon">V</div>
                <div class="brand-name">AnimeVortex</div>
            </div>
            <div class="search-box-container">
                <input type="text" id="searchBar" placeholder="Search anime...">
            </div>
            <button id="addBtn" style="display:none; margin-top:20px; padding:10px 20px; background:var(--accent); border:none; color:white; border-radius:5px; cursor:pointer;" onclick="openUploadModal()">+ Add From Gallery</button>
        </div>

        <main class="container">
            <div class="grid" id="animeGrid"></div>
        </main>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="overlay">
        <div class="modal-box">
            <h2 id="modalTitle">Upload Anime</h2>
            <input type="text" id="animeTitle" placeholder="Anime Title">
            
            <label>Select Cover Image (Photo)</label>
            <input type="file" id="imgFile" accept="image/*">
            
            <label>Select Video File</label>
            <input type="file" id="videoFile" accept="video/*">

            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>
            <p id="statusMsg" style="font-size: 12px; text-align: center; color: var(--accent);"></p>

            <button id="saveBtn" onclick="handleUpload()">Upload & Save</button>
            <button style="background:#444;" onclick="closeModal('adminModal')">Cancel</button>
        </div>
    </div>

    <!-- Video Player Overlay -->
    <div id="playerOverlay" class="overlay">
        <div class="player-box" style="width: 95%; max-width: 900px;">
            <div style="text-align: right; cursor: pointer; padding: 10px;" onclick="closePlayer()">CLOSE</div>
            <div id="videoContainer"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB5EXeX3OOdtuKmrjRmp22V74NATBgGysk",
            authDomain: "animevortex-f9590.firebaseapp.com",
            projectId: "animevortex-f9590",
            storageBucket: "animevortex-f9590.firebasestorage.app",
            messagingSenderId: "983386922614",
            appId: "1:983386922614:web:ab60c63a0b637e2bfa0957",
            databaseURL: "https://animevortex-f9590-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('animeData');
        const storage = firebase.storage();

        let animeData = [];
        let isAdmin = false;

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            animeData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderGrid(animeData);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
            }, 2500);
        });

        function renderGrid(data) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.image}" onclick="openPlayer('${item.url}')">
                    <div class="card-info"><h3>${item.title}</h3></div>
                    <div class="admin-btns" style="display:${isAdmin ? 'flex' : 'none'}">
                        <button class="del-btn" onclick="deleteAnime('${item.id}')">Delete</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function handleUpload() {
            const title = document.getElementById('animeTitle').value;
            const imgFile = document.getElementById('imgFile').files[0];
            const videoFile = document.getElementById('videoFile').files[0];

            if(!title || !imgFile || !videoFile) return alert("Please fill all fields!");

            document.getElementById('progContainer').style.display = 'block';
            const status = document.getElementById('statusMsg');

            try {
                // Upload Image
                status.innerText = "Uploading Image...";
                const imgRef = storage.ref(`images/${Date.now()}_${imgFile.name}`);
                await imgRef.put(imgFile);
                const imgUrl = await imgRef.getDownloadURL();

                // Upload Video
                status.innerText = "Uploading Video (Please wait)...";
                const videoRef = storage.ref(`videos/${Date.now()}_${videoFile.name}`);
                const uploadTask = videoRef.put(videoFile);

                uploadTask.on('state_changed', (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById('progBar').style.width = progress + '%';
                }, null, async () => {
                    const videoUrl = await videoRef.getDownloadURL();
                    db.push({ title, image: imgUrl, url: videoUrl });
                    status.innerText = "Upload Complete!";
                    setTimeout(() => closeModal('adminModal'), 1000);
                });

            } catch (err) {
                console.error(err);
                alert("Upload failed! Check Firebase Storage rules.");
            }
        }

        function checkAdmin() {
            if(prompt("Password:") === "9847ni") {
                isAdmin = true;
                document.getElementById('addBtn').style.display = 'inline-block';
                renderGrid(animeData);
            }
        }

        function openPlayer(url) {
            const container = document.getElementById('videoContainer');
            if(url.includes('youtube.com')) {
                container.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video src="${url}" controls autoplay></video>`;
            }
            document.getElementById('playerOverlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('playerOverlay').style.display = 'none';
            document.getElementById('videoContainer').innerHTML = '';
        }

        function openUploadModal() {
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('progBar').style.width = '0%';
            document.getElementById('statusMsg').innerText = '';
        }

        function deleteAnime(id) {
            if(confirm("Delete it?")) firebase.database().ref('animeData/' + id).remove();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
